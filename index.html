                            <div class="flex justify-between font-bold text-slate-200 text-[11px]">
                                <span>🔮 技能 1：${char.skills.skill1.name}</span>
                                <span class="text-slate-400 font-mono text-[10px]">按鍵: ${keyMap.s1} | CD: ${char.skills.skill1.cooldown}s</span>
                            </div>
                            <div class="text-[10px] text-slate-400 mt-1 flex items-center gap-1.5 flex-wrap">
                                💥 技能傷害: ${char.skills.skill1.damage} | 效果: ${this.parseSchemaEffects(char.skills.skill1)}
                            </div>
                        </div>
                        <div class="bg-slate-950/30 p-1.5 rounded border border-slate-800/40">
                            <div class="flex justify-between font-bold text-slate-200 text-[11px]">
                                <span>⚡ 技能 2：${char.skills.skill2.name}</span>
                                <span class="text-slate-400 font-mono text-[10px]">按鍵: ${keyMap.s2} | CD: ${char.skills.skill2.cooldown}s</span>
                            </div>
                            <div class="text-[10px] text-slate-400 mt-1 flex items-center gap-1.5 flex-wrap">
                                💥 重擊傷害: ${char.skills.skill2.damage} | 效果: ${this.parseSchemaEffects(char.skills.skill2)}
                            </div>
                        </div>
                    </div>
                `;
            },

            updatePreviews() {
                const p1 = CharacterClasses[GameState.p1Class];
                const p2 = CharacterClasses[GameState.p2Class];

                const p1Keys = { atk: 'Q', s1: 'W', s2: 'E' };
                const p2Keys = GameState.mode === 'ai' 
                    ? { atk: '-', s1: '-', s2: '-' } 
                    : { atk: 'P', s1: '[', s2: ']' };

                document.getElementById('p1-preview').innerHTML = this.renderPreviewHTML(p1, p1Keys);
                document.getElementById('p2-preview').innerHTML = this.renderPreviewHTML(p2, p2Keys);
            },

            updateLobbyView() {
                // 由狀態機控制中的 syncUI 來統一渲染，大廳直接交給狀態機中繼
                syncUI();
            },

            updateHUD(player1, player2) {
                const p1HpPercent = (player1.hp / player1.maxHp) * 100;
                const p2HpPercent = (player2.hp / player2.maxHp) * 100;

                document.getElementById('hud-p1-hp').style.width = `${p1HpPercent}%`;
                document.getElementById('hud-p2-hp').style.width = `${p2HpPercent}%`;

                setTimeout(() => {
                    const back1 = document.getElementById('hud-p1-hp-back');
                    const back2 = document.getElementById('hud-p2-hp-back');
                    if (back1) back1.style.width = `${p1HpPercent}%`;
                    if (back2) back2.style.width = `${p2HpPercent}%`;
                }, 300);

                this.updateSkillIconCooldown('p1-skill1-cd', player1.cooldowns.skill1, player1.classData.skills.skill1.cooldown);
                this.updateSkillIconCooldown('p1-skill2-cd', player1.cooldowns.skill2, player1.classData.skills.skill2.cooldown);
                
                if (GameState.touchEnabled) {
                    this.updateSkillIconCooldown('touch-p1-s1-cd', player1.cooldowns.skill1, player1.classData.skills.skill1.cooldown);
                    this.updateSkillIconCooldown('touch-p1-s2-cd', player1.cooldowns.skill2, player1.classData.skills.skill2.cooldown);
                }

                this.updateSkillIconCooldown('p2-skill1-cd', player2.cooldowns.skill1, player2.classData.skills.skill1.cooldown);
                this.updateSkillIconCooldown('p2-skill2-cd', player2.cooldowns.skill2, player2.classData.skills.skill2.cooldown);

                if (GameState.touchEnabled && GameState.mode === 'pvp') {
                    this.updateSkillIconCooldown('touch-p2-s1-cd', player2.cooldowns.skill1, player2.classData.skills.skill1.cooldown);
                    this.updateSkillIconCooldown('touch-p2-s2-cd', player2.cooldowns.skill2, player2.classData.skills.skill2.cooldown);
                }
            },

            updateSkillIconCooldown(elementId, currentCD, maxCD) {
                const el = document.getElementById(elementId);
                if (!el) return;
                if (currentCD > 0) {
                    el.style.opacity = '1';
                    el.innerText = currentCD.toFixed(1) + 's';
                } else {
                    el.style.opacity = '0';
                }
            },

            showAnnouncement(text, duration, callback) {
                const screen = document.getElementById('announcement-screen');
                const label = document.getElementById('announcement-text');
                
                screen.classList.remove('hidden');
                label.innerText = text;

                if (text.length > 2) {
                    label.className = "orbitron text-7xl md:text-8xl font-black tracking-widest text-red-500 animate-pulse neon-text-red";
                } else {
                    label.className = "orbitron text-8xl md:text-9xl font-black tracking-widest text-yellow-400 animate-bounce neon-text-blue";
                }

                setTimeout(() => {
                    screen.classList.add('hidden');
                    if (callback) callback();
                }, duration);
            }
        };

        // 選擇遊戲模式與難度
        function selectMode(mode) {
            setMode(mode);
        }

        function selectDifficulty(diff) {
            GameState.difficulty = diff;
            syncUI();
        }

        // 下載單機版
        function downloadGameCode() {
            const rawHTML = document.documentElement.outerHTML;
            const blob = new Blob([`<!DOCTYPE html>\n` + rawHTML], { type: "text/html;charset=utf-8" });
            const tempAnchor = document.createElement("a");
            tempAnchor.href = URL.createObjectURL(blob);
            tempAnchor.download = VERSION_INFO.downloadFilename;
            document.body.appendChild(tempAnchor);
            tempAnchor.click();
            document.body.removeChild(tempAnchor);
            URL.revokeObjectURL(tempAnchor.href);
        }

        // --- 7. 核心管理器 GameManager ---
        class GameManager {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.p1 = null;
                this.p2 = null;
                this.aiCtrl = null;
                this.projectiles = [];
                this.particles = [];
                
                this.timerInterval = null;
                this.keys = {};

                // Hit Pause 停頓計時器 (影格數單位)
                this.hitPauseTimer = 0;

                this.setupEventListeners();
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                let targetWidth = windowWidth - 32;
                let targetHeight = (targetWidth * 9) / 16;

                if (targetHeight > windowHeight - 160) {
                    targetHeight = windowHeight - 160;
                    targetWidth = (targetHeight * 16) / 9;
                }

                const container = document.getElementById('canvas-container');
                container.style.width = `${targetWidth}px`;
                container.style.height = `${targetHeight}px`;

                this.canvas.width = GAME_WIDTH;
                this.canvas.height = GAME_HEIGHT;
            }

            triggerHitstop() {
                this.hitPauseTimer = 5;
            }

            setupEventListeners() {
                // 初始化物理與虛擬按鍵輸入層
                InputLayer.init();
                this.setupTouchControls();
            }

            // 📱 虛擬按鈕多點觸控映射 (完全轉為 InputLayer Action 與 dispatchAction)
            setupTouchControls() {
                const bindTouchContinuous = (id, player, action) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    
                    const startAction = (e) => {
                        e.preventDefault();
                        InputLayer.setTouchState(player, action, true);
                    };
                    
                    const stopAction = (e) => {
                        e.preventDefault();
                        InputLayer.setTouchState(player, action, false);
                    };
                    
                    el.addEventListener('touchstart', startAction, { passive: false });
                    el.addEventListener('touchend', stopAction, { passive: false });
                    el.addEventListener('touchcancel', stopAction, { passive: false });
                    
                    // 同時支援滑鼠點擊
                    el.addEventListener('mousedown', (e) => {
                        InputLayer.setTouchState(player, action, true);
                    });
                    el.addEventListener('mouseup', () => {
                        InputLayer.setTouchState(player, action, false);
                    });
                    el.addEventListener('mouseleave', () => {
                        InputLayer.setTouchState(player, action, false);
                    });
                };

                const bindTouchInstant = (id, player, action) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    
                    const triggerAction = (e) => {
                        e.preventDefault();
                        this.dispatchAction(player, action);
                    };
                    
                    el.addEventListener('touchstart', triggerAction, { passive: false });
                    el.addEventListener('mousedown', (e) => {
                        this.dispatchAction(player, action);
                    });
                };

                // Player 1 連續型移動指令綁定 (左、右、蹲)
                bindTouchContinuous('touch-p1-left', 'p1', 'left');
                bindTouchContinuous('touch-p1-right', 'p1', 'right');
                bindTouchContinuous('touch-p1-down', 'p1', 'crouch');

                // Player 1 瞬間單次型指令綁定 (跳躍、攻擊、技能1、技能2)
                bindTouchInstant('touch-p1-up', 'p1', 'jump');
                bindTouchInstant('touch-p1-attack', 'p1', 'attack');
                bindTouchInstant('touch-p1-skill1', 'p1', 'skill1');
                bindTouchInstant('touch-p1-skill2', 'p1', 'skill2');

                // Player 2 連續型移動指令綁定 (左、右、蹲)
                bindTouchContinuous('touch-p2-left', 'p2', 'left');
                bindTouchContinuous('touch-p2-right', 'p2', 'right');
                bindTouchContinuous('touch-p2-down', 'p2', 'crouch');

                // Player 2 瞬間單次型指令綁定 (跳躍、攻擊、技能1、技能2)
                bindTouchInstant('touch-p2-up', 'p2', 'jump');
                bindTouchInstant('touch-p2-attack', 'p2', 'attack');
                bindTouchInstant('touch-p2-skill1', 'p2', 'skill1');
                bindTouchInstant('touch-p2-skill2', 'p2', 'skill2');
            }

            // 🎯 中央動作分度器 (Sole Actor Gatekeeper)
            dispatchAction(playerId, action, value = null) {
                const actor = (playerId === 'p1') ? this.p1 : this.p2;
                const target = (playerId === 'p1') ? this.p2 : this.p1;
                if (!actor || actor.hp <= 0) return;

                switch (action) {
                    case 'move':
                        actor.move(value);
                        break;
                    case 'jump':
                        actor.jump();
                        break;
                    case 'crouch':
                        actor.crouch(value);
                        break;
                    case 'attack':
                        {
                            const proj = actor.useSkill('attack', target);
                            if (proj) this.spawnProjectiles(proj);
                        }
                        break;
                    case 'skill1':
                        {
                            const proj = actor.useSkill('skill1', target);
                            if (proj) this.spawnProjectiles(proj);
                        }
                        break;
                    case 'skill2':
                        {
                            const proj = actor.useSkill('skill2', target);
                            if (proj) this.spawnProjectiles(proj);
                        }
                        break;
                }
            }

            initMatch() {
                this.p1 = new Player('p1', 150, 200, GameState.p1Class);
                this.p2 = new Player('p2', 800, 200, GameState.p2Class);

                document.getElementById('hud-p1-name').innerText = this.p1.classData.name;
                document.getElementById('hud-p2-name').innerText = this.p2.classData.name;
                document.getElementById('p1-skill1-icon').innerText = this.p1.classData.skills.skill1.icon;
                document.getElementById('p1-skill2-icon').innerText = this.p1.classData.skills.skill2.icon;
                document.getElementById('p2-skill1-icon').innerText = this.p2.classData.skills.skill1.icon;
                document.getElementById('p2-skill2-icon').innerText = this.p2.classData.skills.skill2.icon;

                // 更新 P1 與 P2 虛擬觸控按鈕的圖標
                const p1TouchS1 = document.getElementById('touch-p1-s1-icon');
                const p1TouchS2 = document.getElementById('touch-p1-s2-icon');
                if (p1TouchS1) p1TouchS1.innerText = this.p1.classData.skills.skill1.icon || '🔮';
                if (p1TouchS2) p1TouchS2.innerText = this.p1.classData.skills.skill2.icon || '⚡';

                const p2TouchS1 = document.getElementById('touch-p2-s1-icon');
                const p2TouchS2 = document.getElementById('touch-p2-s2-icon');
                if (p2TouchS1) p2TouchS1.innerText = this.p2.classData.skills.skill1.icon || '🔥';
                if (p2TouchS2) p2TouchS2.innerText = this.p2.classData.skills.skill2.icon || '☄️';

                document.getElementById('p1-s1-key').innerText = 'W';
                document.getElementById('p1-s2-key').innerText = 'E';

                this.projectiles = [];
                this.particles = [];
                this.hitPauseTimer = 0;

                UIManager.updateHUD(this.p1, this.p2);
            }

            spawnProjectiles(projList) {
                if (projList && projList.length > 0) {
                    this.projectiles.push(...projList);
                }
            }

            createHitParticles(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    const vx = (Math.random() - 0.5) * 8;
                    const vy = (Math.random() - 0.5) * 8 - 2;
                    const size = Math.random() * 4 + 2;
                    const life = Math.random() * 20 + 15;
                    this.particles.push(new Particle(x, y, color, vx, vy, size, life));
                }
            }

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    if (GameState.isGameRunning && !GameState.isPaused) {
                        GameState.timer--;
                        document.getElementById('game-timer').innerText = GameState.timer;
                        
                        if (GameState.timer <= 0) {
                            this.handleTimeOut();
                        }
                    }
                }, 1000);
            }

            handleTimeOut() {
                clearInterval(this.timerInterval);
                if (this.p1.hp > this.p2.hp) {
                    this.endGame('p1');
                } else if (this.p2.hp > this.p1.hp) {
                    this.endGame(GameState.mode === 'ai' ? 'ai' : 'p2');
                } else {
                    this.endGame('draw');
                }
            }

            // 核心：由 InputLayer 的狀態值進行輪詢與 Action 集中發送 (不包含任何 DOM 操控)
            handleInput() {
                if (!this.p1 || !this.p2) return;

                // Player 1 連續移動指令發送
                if (InputLayer.states.p1.left) {
                    this.dispatchAction('p1', 'move', -1);
                } else if (InputLayer.states.p1.right) {
                    this.dispatchAction('p1', 'move', 1);
                }

                // Player 1 連續下蹲指令發送
                if (InputLayer.states.p1.crouch) {
                    this.dispatchAction('p1', 'crouch', true);
                } else {
                    if (this.p1.isCrouching) {
                        this.dispatchAction('p1', 'crouch', false);
                    }
                }

                // Player 2 連續動作 (不論實體或是虛擬觸控)
                if (GameState.mode === 'pvp') {
                    if (InputLayer.states.p2.left) {
                        this.dispatchAction('p2', 'move', -1);
                    } else if (InputLayer.states.p2.right) {
                        this.dispatchAction('p2', 'move', 1);
                    }

                    if (InputLayer.states.p2.crouch) {
                        this.dispatchAction('p2', 'crouch', true);
                    } else {
                        if (this.p2.isCrouching) {
                            this.dispatchAction('p2', 'crouch', false);
                        }
                    }
                }
            }

            checkCollisions() {
                // 1. P1 近戰 Hitbox 碰撞 P2 Hurtbox
                if (this.p1.hitbox && this.rectCollision(this.p1.hitbox, this.p2.hurtbox)) {
                    if (!this.p2.isHit) {
                        const skillInfo = this.p1.classData.skills[this.p1.currentAttackType];
                        this.p2.takeDamage(this.p1.hitbox.damage, this.p1.currentAttackType, this.p1.x);
                        
                        this.triggerHitstop();

                        if (skillInfo && skillInfo.effects) {
                            skillInfo.effects.forEach(eff => {
                                this.p2.effects.push({ type: eff.type, value: eff.value, duration: eff.duration });
                            });
                        }
                        this.createHitParticles(this.p2.x + this.p2.width/2, this.p2.y + this.p2.height/2, this.p1.color);
                    }
                }

                // 2. P2 近戰 Hitbox 碰撞 P1 Hurtbox
                if (this.p2.hitbox && this.rectCollision(this.p2.hitbox, this.p1.hurtbox)) {
                    if (!this.p1.isHit) {
                        const skillInfo = this.p2.classData.skills[this.p2.currentAttackType];
                        this.p1.takeDamage(this.p2.hitbox.damage, this.p2.currentAttackType, this.p2.x);
                        
                        this.triggerHitstop();

                        if (skillInfo && skillInfo.effects) {
                            skillInfo.effects.forEach(eff => {
                                this.p1.effects.push({ type: eff.type, value: eff.value, duration: eff.duration });
                            });
                        }
                        this.createHitParticles(this.p1.x + this.p1.width/2, this.p1.y + this.p1.height/2, this.p2.color);
                    }
                }

                // 3. 遠程投射物碰撞判定
                this.projectiles.forEach((proj) => {
                    if (!proj.active) return;

                    if (proj.owner === 'p1') {
                        if (this.rectCollision(proj.getHurtbox(), this.p2.hurtbox)) {
                            this.p2.takeDamage(proj.damage, proj.skillType, proj.x);
                            
                            this.triggerHitstop();

                            if (proj.skillData.effects) {
                                proj.skillData.effects.forEach(eff => {
                                    this.p2.effects.push({ type: eff.type, value: eff.value, duration: eff.duration });
                                });
                            }
                            this.createHitParticles(proj.x, proj.y, proj.color);
                            proj.active = false;
                        }
                    }
                    else {
                        if (this.rectCollision(proj.getHurtbox(), this.p1.hurtbox)) {
                            this.p1.takeDamage(proj.damage, proj.skillType, proj.x);
                            
                            this.triggerHitstop();

                            if (proj.skillData.effects) {
                                proj.skillData.effects.forEach(eff => {
                                    this.p1.effects.push({ type: eff.type, value: eff.value, duration: eff.duration });
                                });
                            }
                            this.createHitParticles(proj.x, proj.y, proj.color);
                            proj.active = false;
                        }
                    }
                });

                this.projectiles = this.projectiles.filter(p => p.active);
            }

            rectCollision(rect1, rect2) {
                return (
                    rect1.x < rect2.x + rect2.width &&
                    rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height &&
                    rect1.y + rect1.height > rect2.y
                );
            }

            loop() {
                if (!GameState.isGameRunning || GameState.isPaused) return;

                // Hit Pause 命中卡肉停頓
                if (this.hitPauseTimer > 0) {
                    this.hitPauseTimer--;
                    
                    this.particles.forEach(p => p.update());
                    this.particles = this.particles.filter(p => p.life > 0);
                    
                    this.draw();
                    requestAnimationFrame(() => this.loop());
                    return;
                }

                this.handleInput();

                if (this.aiCtrl) {
                    this.aiCtrl.update();
                }

                this.p1.update();
                this.p2.update();

                this.projectiles.forEach(p => p.update());
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.life > 0);

                this.checkCollisions();

                this.draw();

                UIManager.updateHUD(this.p1, this.p2);

                if (this.p1.hp <= 0) {
                    this.endGame(GameState.mode === 'ai' ? 'ai' : 'p2');
                } else if (this.p2.hp <= 0) {
                    this.endGame('p1');
                }

                requestAnimationFrame(() => this.loop());
            }

            draw() {
                this.ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                this.ctx.strokeStyle = '#1e293b';
                this.ctx.lineWidth = 1;
                for (let x = 0; x < GAME_WIDTH; x += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, GROUND_Y);
                    this.ctx.stroke();
                }
                for (let y = 0; y < GROUND_Y; y += 40) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(GAME_WIDTH, y);
                    this.ctx.stroke();
                }

                this.ctx.fillStyle = '#0f172a';
                this.ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);
                this.ctx.strokeStyle = '#3b82f6';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(0, GROUND_Y);
                this.ctx.lineTo(GAME_WIDTH, GROUND_Y);
                this.ctx.stroke();

                this.p1.draw(this.ctx);
                this.p2.draw(this.ctx);

                this.projectiles.forEach(p => p.draw(this.ctx));
                this.particles.forEach(p => p.draw(this.ctx));
            }

            endGame(winner) {
                GameState.isGameRunning = false;
                GameState.winner = winner;
                setScreen('victory');

                if (this.timerInterval) clearInterval(this.timerInterval);

                const vTitle = document.getElementById('victory-title');
                const vDesc = document.getElementById('victory-desc');

                if (winner === 'p1') {
                    vTitle.innerText = "PLAYER 1 WIN";
                    vTitle.className = "orbitron text-5xl md:text-6xl font-black tracking-widest text-blue-400 neon-text-blue";
                    vDesc.innerText = `玩家一 [${this.p1.classData.name}] 取得了勝利！`;
                } else if (winner === 'p2') {
                    vTitle.innerText = "PLAYER 2 WIN";
                    vTitle.className = "orbitron text-5xl md:text-6xl font-black tracking-widest text-red-400 neon-text-red";
                    vDesc.innerText = `玩家二 [${this.p2.classData.name}] 取得了勝利！`;
                } else if (winner === 'ai') {
                    vTitle.innerText = "AI WIN";
                    vTitle.className = "orbitron text-5xl md:text-6xl font-black tracking-widest text-red-500 neon-text-red";
                    vDesc.innerText = `AI 電腦 [${this.p2.classData.name}] 贏得了本次對決！`;
                } else {
                    vTitle.innerText = "DRAW GAME";
                    vTitle.className = "orbitron text-5xl md:text-6xl font-black tracking-widest text-yellow-400";
                    vDesc.innerText = "雙方勢均力敵，以平手收場！";
                }
            }
        }

        const gameManager = new GameManager();

        // 頁面加載完成時
        window.onload = function() {
            UIManager.init();

            // 智慧偵測裝置是否支援觸控
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);
            if (isTouchDevice) {
                GameState.touchEnabled = true;
                syncUI();
            }

            // 雙保險觸控事件
            window.addEventListener('touchstart', function detectTouch() {
                GameState.touchEnabled = true;
                syncUI();
                window.removeEventListener('touchstart', detectTouch);
            }, { passive: true });
        };

        function startGame() {
            GameState.winner = null;
            GameState.timer = 99;
            document.getElementById('game-timer').innerText = GameState.timer;

            gameManager.initMatch();
            
            // 使用狀態機集中同步 input, AI, UI
            syncInput();
            syncAI();
            setScreen('match');

            let count = 3;
            const runCountdown = () => {
                if (count > 0) {
                    UIManager.showAnnouncement(count.toString(), 900, () => {
                        count--;
                        runCountdown();
                    });
                } else {
                    UIManager.showAnnouncement("FIGHT", 1000, () => {
                        GameState.isGameRunning = true;
                        gameManager.startTimer();
                        gameManager.loop();
                    });
                }
            };
            runCountdown();
        }

        function resumeGame() {
            GameState.isPaused = false;
            setScreen('match');
            gameManager.loop();
        }

        function togglePause() {
            if (!GameState.isGameRunning) return;
            GameState.isPaused = !GameState.isPaused;
            if (GameState.isPaused) {
                setScreen('pause');
            } else {
                resumeGame();
            }
        }

        function exitToLobby() {
            GameState.isGameRunning = false;
            GameState.isPaused = false;
            if (gameManager.timerInterval) clearInterval(gameManager.timerInterval);

            syncInput();
            setScreen('lobby');
        }

        function rematch() {
            startGame();
        }

        function toggleDebug() {
            debugMode = !debugMode;
        }
    </script>
